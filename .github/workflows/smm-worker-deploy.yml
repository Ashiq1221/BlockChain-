name: Deploy SMM Sentinel Worker

on:
  push:
    branches: [claude/smmfollows-api-access-4q2rqv]
    paths:
      - 'worker/**'
      - 'wrangler.toml'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/smmfollows-api-access-4q2rqv

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_KEY:    ${{ secrets.CF_GLOBAL_API_KEY }}
          CLOUDFLARE_EMAIL:      ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.SMM_API_KEY }}"    | wrangler secret put SMM_API_KEY
          echo "${{ secrets.SMMWIZ_API_KEY }}" | wrangler secret put SMMWIZ_API_KEY
          echo "${{ secrets.ASTRA_API_KEY }}"  | wrangler secret put ASTRA_API_KEY
          echo "${{ secrets.SMM_USER }}"        | wrangler secret put SMM_USER
          echo "${{ secrets.SMM_PASS }}"        | wrangler secret put SMM_PASS
          echo "${{ secrets.SMMWIZ_USER }}"     | wrangler secret put SMMWIZ_USER
          echo "${{ secrets.SMMWIZ_PASS }}"     | wrangler secret put SMMWIZ_PASS
          echo "${{ secrets.ASTRA_USER }}"      | wrangler secret put ASTRA_USER
          echo "${{ secrets.ASTRA_PASS }}"      | wrangler secret put ASTRA_PASS

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_KEY:    ${{ secrets.CF_GLOBAL_API_KEY }}
          CLOUDFLARE_EMAIL:      ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: wrangler deploy
