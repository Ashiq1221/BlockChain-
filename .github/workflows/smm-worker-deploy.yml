name: Deploy SMM Sentinel Worker

on:
  push:
    branches: [claude/smmfollows-api-access-4q2rqv]
    paths:
      - 'worker/**'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/smmfollows-api-access-4q2rqv

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '3'
        env:
          # SMM panel secrets injected at deploy time
          SMM_API_KEY:    ${{ secrets.SMM_API_KEY }}
          SMMWIZ_API_KEY: ${{ secrets.SMMWIZ_API_KEY }}
          ASTRA_API_KEY:  ${{ secrets.ASTRA_API_KEY }}
          SMM_USER:       ${{ secrets.SMM_USER }}
          SMM_PASS:       ${{ secrets.SMM_PASS }}
          SMMWIZ_USER:    ${{ secrets.SMMWIZ_USER }}
          SMMWIZ_PASS:    ${{ secrets.SMMWIZ_PASS }}
          ASTRA_USER:     ${{ secrets.ASTRA_USER }}
          ASTRA_PASS:     ${{ secrets.ASTRA_PASS }}
